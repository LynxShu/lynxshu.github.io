<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸽子精正在建设中</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #4a4a4a;
            --code-color: #e0e0e0; 
            --icon-color: #888888;
            --icon-bg-color: #f0f0f0;
            --toggle-icon-color: #2a2a2a;

            --github-hover: #333;
            --bilibili-hover: #00a1d6;
            --youtube-hover: #FF0000;
        }

        html[data-theme='dark'] {
            --bg-color: #121212;
            --text-color: #cccccc;
            --code-color: #2a2a2a; 
            --icon-color: #777777;
            --icon-bg-color: #2a2a2a;
            --toggle-icon-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            text-align: center;
            padding: 1rem;
        }

        .container {
            max-width: 450px;
        }

        .error-code {
            font-size: 10rem; 
            font-weight: 900;
            color: var(--code-color);
            line-height: 1;
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
        }

        .message {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 2.5rem;
            color: var(--text-color);
            letter-spacing: 0.5px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
        }

        .social-links a {
            color: var(--icon-color);
            font-size: 2.5rem;
            text-decoration: none;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .social-links a:hover {
            transform: scale(1.15) translateY(-3px);
        }

        .social-links a:hover .fa-github { color: var(--github-hover); }
        .social-links a:hover .fa-bilibili { color: var(--bilibili-hover); }
        .social-links a:hover .fa-youtube { color: var(--youtube-hover); }

        .theme-switcher {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
        }

        #theme-toggle {
            display: none;
        }

        .theme-switcher label {
            cursor: pointer;
            font-size: 1.25rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--icon-bg-color);
            color: var(--toggle-icon-color);
            display: grid;
            place-items: center;
            transition: background-color 0.3s ease, color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        
        .theme-switcher label:hover {
            transform: scale(1.05);
        }

        .theme-switcher .fa-sun { display: none; }
        .theme-switcher .fa-moon { display: block; }

        html[data-theme='dark'] .theme-switcher .fa-sun { display: block; }
        html[data-theme='dark'] .theme-switcher .fa-moon { display: none; }
    </style>
</head>
<body>

    <div class="theme-switcher">
        <input type="checkbox" id="theme-toggle">
        <label for="theme-toggle">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun"></i>
        </label>
    </div>

    <main class="container">
        
        <h1 class="error-code">404</h1>

        <p class="message">嗯...鸽子精正在建设中...</p>

        <div class="social-links">
            <a href="https://github.com/LynxShu" target="_blank" rel="noopener noreferrer" aria-label="Github">
                <i class="fab fa-github"></i>
            </a>
            <a href="https://space.bilibili.com/582462" target="_blank" rel="noopener noreferrer" aria-label="Bilibili">
                <i class="fab fa-bilibili"></i>
            </a>
            <a href="https://www.youtube.com/@LynxShu" target="_blank" rel="noopener noreferrer" aria-label="Youtube">
                <i class="fab fa-youtube"></i>
            </a>
        </div>
    </main>

    <script>
        (function() {
            const themeToggle = document.getElementById('theme-toggle');
            const htmlElement = document.documentElement;

            const currentTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (currentTheme === 'dark') {
                htmlElement.setAttribute('data-theme', 'dark');
                themeToggle.checked = true;
            } else if (currentTheme === 'light') {
                htmlElement.setAttribute('data-theme', 'light');
                themeToggle.checked = false;
            } else if (prefersDark) {
                htmlElement.setAttribute('data-theme', 'dark');
                themeToggle.checked = true;
            }

            themeToggle.addEventListener('change', function() {
                if (this.checked) {
                    htmlElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    htmlElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                }
            });
        })();
    </script>
</body>
</html>
